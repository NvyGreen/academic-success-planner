{% from "macros/short_courses.html" import courses_short %}

{% extends "layout.html" %}

{% block head_content %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/schedule.css') }}" />
{% endblock %}

{% block main_content %}
    <div class="schedule__container">

        <div class="schedule__half">
            <div class="schedule__nav">
                <a href="{{ url_for('pages.user_courses') }}" class="schedule__link schedule__link--outline">&#9670; Weekly</a>
                <a href="{{ url_for('pages.user_finals') }}" class="schedule__link schedule__link--outline">&#8862; Finals</a>
                <a href="{{ url_for('pages.user_quarter') }}" class="schedule__link schedule__link--active">Quarter</a>
            </div>

            <img src="{{ url_for('static', filename='Fall-2024.png') }}" class="schedule__quarter" />
        </div>

        <hr />

        <div class="schedule__courses-section">
            <div class="schedule__courses-header-row">
                <h2 class="schedule__courses-heading">My Courses</h2>
                <div class="schedule__courses-actions">
                    <a href="{{ url_for('pages.user_courses') }}" class="schedule__btn--outline">Back to Weekly</a>
                </div>
            </div>

            {{ courses_short(courses) }}
        </div>

    </div>
{% endblock %}
