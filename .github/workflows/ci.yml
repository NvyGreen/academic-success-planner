name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements*.txt

      # Test tier only: runtime + pytest. Locust (load-testing) is deliberately
      # kept off CI's install path so a heavy native dep can't redden the suite.
      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Run tests
        run: python -m pytest tests/
